# ---------------------------------------------------------------
# Document type definitions and field mappings
#
# Each top-level key is a DocumentType enum value.
# `keywords`   -- terms used by the classifier to score candidates.
# `fields`     -- semantic tag -> list of raw-key aliases.
# `schema`     -- dotted path to the Pydantic extraction model.
# ---------------------------------------------------------------

rental_statement:
  display_name: "Rental / Lease Statement"
  schema: "document_intelligence.models.rental.RentalStatement"
  keywords:
    - rent
    - tenant
    - landlord
    - lease
    - property
    - unit
    - rental statement
    - balance due
    - monthly rent
    - housing
    - occupant
  fields:
    tenant_name:
      - tenant name
      - tenant
      - resident
      - occupant
      - renter
      - lessee
    landlord_name:
      - landlord
      - property manager
      - management company
      - owner
      - lessor
    property_address:
      - property address
      - address
      - unit address
      - rental address
      - premises
    unit_number:
      - unit
      - apt
      - apartment
      - suite
      - unit number
    rent_amount:
      - rent
      - monthly rent
      - rent amount
      - base rent
      - rent charge
    total_charges:
      - total charges
      - total due
      - amount due
      - total amount
      - charges total
    total_payments:
      - total payments
      - payments received
      - amount paid
      - credits
    balance_due:
      - balance due
      - balance
      - outstanding balance
      - amount owing
      - remaining balance
    previous_balance:
      - previous balance
      - prior balance
      - opening balance
      - carry forward
    payment_due_date:
      - due date
      - payment due
      - pay by
      - due by
    statement_date:
      - statement date
      - date
      - issued
      - as of
    period_start:
      - period start
      - from
      - start date
      - billing start
    period_end:
      - period end
      - to
      - end date
      - billing end

invoice:
  display_name: "Invoice"
  schema: null  # not yet implemented
  keywords:
