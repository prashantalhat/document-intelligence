    - bill
    - payment due
    - invoice number
    - remittance
    - purchase order
    - subtotal
    - tax
    - total
  fields:
    invoice_number:
      - invoice number
      - invoice no
      - inv #
      - bill number
    vendor_name:
      - vendor
      - supplier
      - from
      - biller
    total_amount:
      - total
      - amount due
      - grand total
      - balance due

bank_statement:
  display_name: "Bank Statement"
  schema: null
  keywords:
    - bank statement
    - account summary
    - opening balance
    - closing balance
    - transaction
    - deposit
    - withdrawal
    - checking
    - savings
  fields:
    account_number:
      - account number
      - account no
    opening_balance:
      - opening balance
      - beginning balance
    closing_balance:
      - closing balance
      - ending balance

tax_form:
  display_name: "Tax Form"
  schema: null
  keywords:
    - tax return
    - W-2
    - "1099"
    - tax form
    - IRS
    - filing
    - taxable income
    - federal tax
    - state tax
  fields:
    form_type:
      - form
      - form type
    tax_year:
      - tax year
      - year
    taxable_income:
      - taxable income
      - gross income
